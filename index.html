<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Instagram</title>
    <!--SEAÑADE EL BOOSTRAP DE DOCS 2-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        .container-fluid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            grid-template-rows: repeat(8, 1fr);
            gap: 8px;
        }

        .a {
            grid-column: span 2 / span 2;
            grid-row: span 8 / span 8;
            /*background-color: blue;*/
            height: 100%;
        }

        .b {
            grid-column: span 7 / span 7;
            grid-column-start: 3;
            background-color: aqua;
            height: 100px;
        }

        .c {
            grid-column: span 7 / span 7;
            grid-row: span 7 / span 7;
            grid-column-start: 3;
            grid-row-start: 2;
            background-color: blueviolet;
            height: 100%;
        }

        .d {
            grid-column: span 3 / span 3;
            grid-row: span 8 / span 8;
            grid-column-start: 10;
            grid-row-start: 1;
            background-color: rgb(149, 127, 228);
            height: 100%;
        }

        @media (min-width: 1159px) and (max-width: 1263px) {

            .a {
                grid-column: span 1 / span 1;
                grid-row: span 8 / span 8;
            }

            .b {
                grid-column: span 8 / span 8;
                grid-column-start: 2;
            }

            .c {
                grid-column: span 8 / span 8;
                grid-row: span 7 / span 7;
                grid-column-start: 2;
                grid-row-start: 2;
            }
        }

        @media (min-width: 777px) and (max-width: 1158px) {

            .a {
                grid-column: span 1 / span 1;
                grid-row: span 8 / span 8;
            }

            .b {
                grid-column: span 11 / span 11;
                grid-column-start: 2;
            }

            .c {
                grid-column: span 11 / span 11;
                grid-row: span 7 / span 7;
                grid-column-start: 2;
                grid-row-start: 2;
            }

            .d {
                display: none;
            }
        }

        @media (min-width: 100px) and (max-width: 766px) {

            .a {
                grid-column: span 12 / span 12;
                grid-column-start: 1;
                grid-row-start: 9;

            }

            .b {
                grid-column: span 12 / span 12;
                grid-column-start: 1;
            }

            .c {
                grid-column: span 12 / span 12;
                grid-row: span 7 / span 7;
                grid-column-start: 1;
                grid-row-start: 2;
            }

            .d {
                display: none;
            }
        }

    /*COLOCO MENU CARRUSEL*/
    </style>
</head>

<body>
    <div class="container-fluid">
        <nav class="a">
            <img src="instagram-logo.png" width="150px"> 
            <br>
            <br>
            <a class="btn btn-light d-flex" href="#" role="button">
                <img src="house-door-fill.svg" alt="" width="20px"> &nbsp; <strong>Inicio</strong></a>
                <br>
            <a class="btn btn-light d-flex" href="#" role="button">
                <img src="search.svg" alt="" width="20px"> &nbsp; <strong>Búsqueda</strong></a>
                <br>
            <a class="btn btn-light d-flex" href="#" role="button">
                <img src="compass.svg" alt="" width="20px"> &nbsp; <strong>Explorar</strong></a>
                <br>
            <a class="btn btn-light d-flex" href="#" role="button">
                <img src="house-door-fill.svg" alt="" width="20px"> &nbsp; <strong>Inicio</strong></a>
                 
        </nav>
        <header class="b">
            <h2>B</h2>
        </header>
        <section class="c">
            <h2>C</h2>
        </section>
        <aside class="d">
            <h2>D</h2>
        </aside>
    </div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>

</html>
